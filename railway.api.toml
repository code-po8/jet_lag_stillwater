# Railway config-as-code for the `api` service (Fastify + WebSocket backend).
#
# Point the Railway `api` service at this file: Service → Settings →
# Config-as-code → Path = `railway.api.toml`. Pins the build/deploy settings so
# they don't drift or need re-clicking on each deploy.
#
# NOT codifiable here (set once in the dashboard — account/project-scoped):
#   - DATABASE_URL  = ${{Postgres.DATABASE_URL}}  (cross-service reference)
#   - WEB_ORIGIN    = the web service's public URL  (CORS + WS origin lock)
#   - the generated public domain.
# Migrations apply automatically on boot (see server/src/db/migrate.ts), so no
# release command is needed.

[build]
builder = "DOCKERFILE"
# Build context is the repo root so the Dockerfile can see shared/ + server/.
dockerfilePath = "server/Dockerfile"

[deploy]
# Liveness/readiness probe (server/src/app.ts GET /health).
healthcheckPath = "/health"
healthcheckTimeout = 30
# The RoomHub is in-memory — do NOT scale past 1 until a Redis fan-out exists.
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
