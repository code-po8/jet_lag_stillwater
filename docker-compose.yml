# Docker sandbox for development & testing (INFRA-001).
#
# WHY: installing/running npm dependencies executes untrusted third-party code
# (pre/post-install scripts, dev server, test runner). Running that on the host
# user exposes ~/.ssh, ~/.npmrc tokens, cloud creds, and the whole home dir.
# These services run that code inside containers that bind-mount ONLY the repo
# source — never $HOME, never ~/.ssh, with no git credentials present.
#
# Workflow:
#   - Edit files and run `git` on the HOST (unchanged).
#   - Run anything that executes dependency code via these services:
#       docker compose run --rm test        # unit tests (no network)
#       docker compose up frontend          # dev server at http://localhost:5173
#       docker compose run --rm install      # install deps into the volume
#
# node_modules live in NAMED VOLUMES (not bind-mounted), so the host's
# node_modules is never touched and host-incompatible native builds stay
# contained.

x-frontend-base: &frontend-base
  build:
    context: .
    dockerfile: Dockerfile.dev
  # Bind-mount ONLY the repository source. Note there is no $HOME or ~/.ssh
  # mount anywhere in this file — that is the core isolation guarantee.
  volumes:
    - ./:/app:cached
    - frontend_node_modules:/app/node_modules
    # Persistent npm cache + home so npm's final reify/rename step has a stable,
    # writable location (avoids "Exit handler never called" on volume mounts).
    - npm_cache:/home/node/.npm
  working_dir: /app
  # Reassert non-root at the compose layer (the image already drops to `node`).
  user: node
  environment:
    NODE_ENV: development
    npm_config_cache: /home/node/.npm

services:
  # One-shot dependency install into the named volume. Run this first, or any
  # time package.json/lockfile changes:  docker compose run --rm install
  install:
    <<: *frontend-base
    # `npm ci` when a lockfile exists is reproducible; fall back to install.
    command: sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi"

  # Vite dev server. Host 0.0.0.0 so it is reachable from the host browser.
  frontend:
    <<: *frontend-base
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    depends_on:
      - install

  # Unit tests + type-check. NETWORK ISOLATED: a malicious postinstall or test
  # dependency cannot phone home or pull a second-stage payload.
  test:
    <<: *frontend-base
    network_mode: "none"
    command: sh -c "npm run type-check && npm run test:unit -- --run"

  # Sentinel: proves the container cannot read host $HOME and has no network.
  # See scripts/sandbox-sentinel.sh. Network isolated like the test-runner.
  sentinel:
    <<: *frontend-base
    network_mode: "none"
    command: sh -c "/app/scripts/sandbox-sentinel.sh"

  # Pre-commit checks (eslint, prettier, type-check, vitest, gitleaks) run here
  # instead of on the host, so none of that dependency code touches your user.
  # Unlike `test`, this service needs the repo .git (gitleaks staged scan +
  # lint-staged read the index) — but still NO $HOME / ~/.ssh mount. The
  # gitleaks binary is baked into the image at build time, so this runs offline.
  hooks:
    <<: *frontend-base
    network_mode: "none"
    # Invoked by .husky/pre-commit via scripts/run-hooks.sh.
    command: sh -c "/app/scripts/hooks-in-container.sh"

  # Backend (Fastify) — STUB for INFRA-001. INFRA-003 adds the real server/
  # package, Dockerfile, and command. Kept here so the compose topology
  # (frontend / backend / postgres / test-runner) is established now.
  backend:
    <<: *frontend-base
    profiles: ["backend"] # not started by default until INFRA-003 fills it in
    command: sh -c "echo 'backend service placeholder — implemented in INFRA-003' && sleep infinity"
    depends_on:
      - postgres

  # Postgres for room/session records (used from INFRA-004 onward).
  postgres:
    image: postgres:16-alpine
    profiles: ["backend"]
    environment:
      POSTGRES_USER: jetlag
      POSTGRES_PASSWORD: jetlag_local_dev
      POSTGRES_DB: jetlag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  frontend_node_modules:
  npm_cache:
  postgres_data:
